<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transformations</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f0f2f5;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
        color: #1a1a2e;
      }

      .card {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 36px 40px 32px;
        max-width: 960px;
        width: 100%;
      }

      h1 {
        text-align: center;
        font-size: 1.6rem;
        letter-spacing: 0.12em;
        font-weight: 700;
        margin-bottom: 28px;
      }

      .panels {
        display: flex;
        gap: 24px;
        margin-bottom: 20px;
      }

      .panel {
        flex: 1;
        border: 2px solid #e0e0e0;
        border-radius: 14px;
        aspect-ratio: 1;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fafafa;
        position: relative;
      }

      .panel-label {
        position: absolute;
        top: 10px;
        left: 12px;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #999;
        z-index: 5;
      }

      .panel .placeholder {
        color: #bbb;
        font-size: 0.95rem;
      }

      .panel img {
        position: absolute;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      .face-overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 2;
      }

      .image-select {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 28px;
        flex-wrap: wrap;
      }

      .image-select button {
        padding: 7px 18px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        background: #fff;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s ease;
        color: #444;
      }

      .image-select button:hover {
        border-color: #a0c4ff;
        background: #f0f7ff;
      }

      .image-select button.active {
        border-color: #4a90d9;
        background: #e8f0fe;
        color: #1a1a2e;
        font-weight: 600;
      }

      .sliders {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 16px;
      }

      .slider-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #f8f9fb;
        border-radius: 12px;
        padding: 14px 10px 12px;
      }

      .slider-group label {
        font-size: 0.78rem;
        font-weight: 600;
        margin-bottom: 10px;
        color: #555;
      }

      .slider-group input[type='range'] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 3px;
        background: #dce3ed;
        outline: none;
      }

      .slider-group input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #4a90d9;
        cursor: pointer;
        border: 2px solid #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      }

      .slider-group input[type='range']::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #4a90d9;
        cursor: pointer;
        border: 2px solid #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      }

      .slider-value {
        font-size: 0.72rem;
        color: #888;
        margin-top: 8px;
        font-variant-numeric: tabular-nums;
      }

      .reset-btn {
        display: block;
        margin: 20px auto 0;
        padding: 8px 28px;
        border: none;
        border-radius: 8px;
        background: #e8f0fe;
        color: #4a90d9;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .reset-btn:hover {
        background: #d0e2fc;
      }

      @media (max-width: 700px) {
        .card {
          padding: 20px 16px;
        }
        .panels {
          flex-direction: column;
        }
        .sliders {
          grid-template-columns: repeat(2, 1fr);
        }
        .sliders .slider-group:last-child {
          grid-column: span 2;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>TRANSFORMATIONS</h1>

      <div class="panels">
        <div class="panel" id="source-panel">
          <span class="panel-label">Source</span>
          <span class="placeholder" id="source-placeholder"
            >Choose an image below</span
          >
          <img id="source-img" src="" alt="Source face" style="display: none" />
          <svg
            class="face-overlay"
            id="source-overlay"
            viewBox="0 0 100 100"
            preserveAspectRatio="xMidYMid meet"
            style="display: none"
          ></svg>
        </div>
        <div class="panel">
          <span class="panel-label">Reference</span>
          <img id="ref-img" src="images/reference.png" alt="Reference face" />
          <svg
            class="face-overlay"
            id="ref-overlay"
            viewBox="0 0 100 100"
            preserveAspectRatio="xMidYMid meet"
          ></svg>
        </div>
      </div>

      <div class="image-select" id="image-select">
        <button data-src="images/tilted.png">Tilted</button>
        <button data-src="images/angled.png">Angled</button>
        <button data-src="images/profile.png">Profile</button>
        <button data-src="images/under.png">Under</button>
        <button data-src="images/small.png">Small</button>
        <button data-src="images/corner.png">Corner</button>
        <button data-src="images/side.png">Side</button>
      </div>

      <div class="sliders">
        <div class="slider-group">
          <label>Reflection</label>
          <input
            type="range"
            id="reflection"
            min="-1"
            max="1"
            step="2"
            value="1"
          />
          <span class="slider-value" id="reflection-val">None</span>
        </div>
        <div class="slider-group">
          <label>Rotation</label>
          <input
            type="range"
            id="rotation"
            min="-180"
            max="180"
            step="1"
            value="0"
          />
          <span class="slider-value" id="rotation-val">0°</span>
        </div>
        <div class="slider-group">
          <label>Dilation</label>
          <input
            type="range"
            id="dilation"
            min="0.2"
            max="5"
            step="0.05"
            value="1"
          />
          <span class="slider-value" id="dilation-val">1.00×</span>
        </div>
        <div class="slider-group">
          <label>Translate X</label>
          <input
            type="range"
            id="translate-x"
            min="-250"
            max="250"
            step="1"
            value="0"
          />
          <span class="slider-value" id="translate-x-val">0 px</span>
        </div>
        <div class="slider-group">
          <label>Translate Y</label>
          <input
            type="range"
            id="translate-y"
            min="-450"
            max="450"
            step="1"
            value="0"
          />
          <span class="slider-value" id="translate-y-val">0 px</span>
        </div>
      </div>

      <button class="reset-btn" id="reset-btn">Reset All</button>
    </div>

    <script>
      const sourceImg = document.getElementById('source-img');
      const placeholder = document.getElementById('source-placeholder');
      const srcOverlay = document.getElementById('source-overlay');
      const refOverlay = document.getElementById('ref-overlay');
      const buttons = document.querySelectorAll('#image-select button');

      const sliders = {
        reflection: document.getElementById('reflection'),
        rotation: document.getElementById('rotation'),
        dilation: document.getElementById('dilation'),
        translateX: document.getElementById('translate-x'),
        translateY: document.getElementById('translate-y'),
      };
      const displays = {
        reflection: document.getElementById('reflection-val'),
        rotation: document.getElementById('rotation-val'),
        dilation: document.getElementById('dilation-val'),
        translateX: document.getElementById('translate-x-val'),
        translateY: document.getElementById('translate-y-val'),
      };

      /* ── Reference landmarks (the target positions) ──
     Coordinate space: 0-100 for both x and y.
     (0,0) = top-left of panel, (100,100) = bottom-right. */
      const LEFT_EYE_X = 43;
      const LEFT_EYE_Y = 39;
      const RIGHT_EYE_X = 57;
      const RIGHT_EYE_Y = 39;
      const NOSE_X = 50;
      const NOSE_Y = 47;
      const LEFT_LIP_X = 45;
      const LEFT_LIP_Y = 53.5;
      const RIGHT_LIP_X = 55;
      const RIGHT_LIP_Y = 53.5;

      const refLandmarks = {
        leftEye: [LEFT_EYE_X, LEFT_EYE_Y],
        rightEye: [RIGHT_EYE_X, RIGHT_EYE_Y],
        nose: [NOSE_X, NOSE_Y],
        leftLip: [LEFT_LIP_X, LEFT_LIP_Y],
        rightLip: [RIGHT_LIP_X, RIGHT_LIP_Y],
      };

      /* ── Bounding box shape ──
     All values are multiples of the eye distance.
     BOX_WIDTH:  half-width to each side of eye midpoint
     BOX_TOP:    how far above the eye-line the box extends
     BOX_BOTTOM: how far below the eye-line the box extends
     GRID_COLS:  number of square grid cells across the width */
      const BOX_WIDTH = 1.05;
      const BOX_TOP = 1.15;
      const BOX_BOTTOM = 1.65;
      const GRID_COLS = 10;

      /* ── Helpers ── */
      function dist(a, b) {
        return Math.hypot(b[0] - a[0], b[1] - a[1]);
      }
      function mid(a, b) {
        return [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
      }

      /* ── Build overlay SVG (grid + box + axes + dots) ── */
      function buildOverlay() {
        const leftEye = refLandmarks.leftEye,
          rightEye = refLandmarks.rightEye;
        const m = mid(leftEye, rightEye);
        const d = dist(leftEye, rightEye) || 1;
        const ux = (rightEye[0] - leftEye[0]) / d;
        const uy = (rightEye[1] - leftEye[1]) / d;
        const vx = -uy,
          vy = ux;

        const hw = d * BOX_WIDTH;
        const ht = d * BOX_TOP;
        const hb = d * BOX_BOTTOM;
        const cellSize = (2 * hw) / GRID_COLS;
        const gridRows = Math.round((ht + hb) / cellSize);

        let svg = '';

        for (let i = 0; i <= GRID_COLS; i++) {
          const tu = -hw + i * cellSize;
          svg += `<line x1="${m[0] + tu * ux - ht * vx}" y1="${m[1] + tu * uy - ht * vy}"
                    x2="${m[0] + tu * ux + hb * vx}" y2="${m[1] + tu * uy + hb * vy}"
                    stroke="#999" stroke-width="0.22" stroke-opacity="0.45"/>`;
        }
        for (let j = 0; j <= gridRows; j++) {
          const tv = -ht + j * cellSize;
          svg += `<line x1="${m[0] - hw * ux + tv * vx}" y1="${m[1] - hw * uy + tv * vy}"
                    x2="${m[0] + hw * ux + tv * vx}" y2="${m[1] + hw * uy + tv * vy}"
                    stroke="#999" stroke-width="0.22" stroke-opacity="0.45"/>`;
        }

        const ext = 2.5;
        svg += `<line x1="${m[0] - (hw + ext) * ux}" y1="${m[1] - (hw + ext) * uy}"
                  x2="${m[0] + (hw + ext) * ux}" y2="${m[1] + (hw + ext) * uy}"
                  stroke="#555" stroke-width="0.45"/>`;
        svg += `<line x1="${m[0] - (ht + ext) * vx}" y1="${m[1] - (ht + ext) * vy}"
                  x2="${m[0] + (hb + ext) * vx}" y2="${m[1] + (hb + ext) * vy}"
                  stroke="#555" stroke-width="0.45"/>`;

        const a = 1.3;
        function arrow(px, py, dx, dy) {
          const nx = -dy,
            ny = dx;
          return `<polygon points="${px},${py} ${px - dx * a + nx * a * 0.5},${py - dy * a + ny * a * 0.5} ${px - dx * a - nx * a * 0.5},${py - dy * a - ny * a * 0.5}" fill="#555"/>`;
        }
        svg += arrow(m[0] + (hw + ext) * ux, m[1] + (hw + ext) * uy, ux, uy);
        svg += arrow(m[0] - (hw + ext) * ux, m[1] - (hw + ext) * uy, -ux, -uy);
        svg += arrow(m[0] - (ht + ext) * vx, m[1] - (ht + ext) * vy, -vx, -vy);
        svg += arrow(m[0] + (hb + ext) * vx, m[1] + (hb + ext) * vy, vx, vy);

        const tl = [m[0] - hw * ux - ht * vx, m[1] - hw * uy - ht * vy];
        const tr = [m[0] + hw * ux - ht * vx, m[1] + hw * uy - ht * vy];
        const br = [m[0] + hw * ux + hb * vx, m[1] + hw * uy + hb * vy];
        const bl = [m[0] - hw * ux + hb * vx, m[1] - hw * uy + hb * vy];
        svg += `<polygon points="${tl} ${tr} ${br} ${bl}" fill="none" stroke="#4CAF50" stroke-width="0.9"/>`;

        const r = 1.25;
        const dots = [
          { p: refLandmarks.leftEye, c: '#4CAF50' },
          { p: refLandmarks.rightEye, c: '#4CAF50' },
          { p: refLandmarks.nose, c: '#FFD600' },
          { p: refLandmarks.leftLip, c: '#F44336' },
          { p: refLandmarks.rightLip, c: '#F44336' },
        ];
        for (const { p, c } of dots) {
          svg += `<circle cx="${p[0]}" cy="${p[1]}" r="${r}" fill="${c}" stroke="#fff" stroke-width="0.4"/>`;
        }

        return svg;
      }

      /* Draw the same overlay on both panels */
      const overlayHTML = buildOverlay();
      srcOverlay.innerHTML = overlayHTML;
      refOverlay.innerHTML = overlayHTML;

      /* ── Sliders — transform only the source image ── */
      function applySliderTransform() {
        const reflectX = Number(sliders.reflection.value);
        const rotate = Number(sliders.rotation.value);
        const scale = Number(sliders.dilation.value);
        const tx = Number(sliders.translateX.value);
        const ty = Number(sliders.translateY.value);

        sourceImg.style.transform = `translate(${tx}px, ${ty}px) rotate(${rotate}deg) scale(${scale * reflectX}, ${scale})`;

        displays.reflection.textContent = reflectX === -1 ? 'Flipped' : 'None';
        displays.rotation.textContent = `${rotate}°`;
        displays.dilation.textContent = `${scale.toFixed(2)}×`;
        displays.translateX.textContent = `${tx} px`;
        displays.translateY.textContent = `${ty} px`;
      }

      Object.values(sliders).forEach((s) =>
        s.addEventListener('input', applySliderTransform),
      );

      /* ── Image selection ── */
      buttons.forEach((btn) => {
        btn.addEventListener('click', () => {
          buttons.forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          sourceImg.src = btn.dataset.src;
          sourceImg.style.display = 'block';
          srcOverlay.style.display = '';
          placeholder.style.display = 'none';
          resetAll();
        });
      });

      /* ── Reset ── */
      function resetAll() {
        sliders.reflection.value = 1;
        sliders.rotation.value = 0;
        sliders.dilation.value = 1;
        sliders.translateX.value = 0;
        sliders.translateY.value = 0;
        applySliderTransform();
      }

      document.getElementById('reset-btn').addEventListener('click', resetAll);
    </script>
  </body>
</html>
